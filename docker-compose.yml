version: "3.9"

services:

  db:
    image: postgres:15
    container_name: freelancehub-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelancehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: freelancehub-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: freelancehub
      DB_PORT: 5432
      JWT_SECRET: mysecretkey

  frontend:
    build: ./frontend
    container_name: freelancehub-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: